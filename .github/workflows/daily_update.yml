name: Daily Movie Update

on:
  schedule:
    - cron: "0 0 * * *" # Runs at midnight UTC every day
  workflow_dispatch: # Allows manual run from the GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build MiniLM index from scratch
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          python build_index.py --model minilm --output-dir models/minilm

      - name: Upload index to Hugging Face Dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << "EOF"
          from huggingface_hub import HfApi

          api = HfApi()
          repo_id = "uditkumar/movie-rec-data"  # HF dataset ID
          token = "${HF_TOKEN}"

          for path in ["models/minilm/faiss.index", "models/minilm/index_data.pkl"]:
              print(f"Uploading {path} to {repo_id}...")
              api.upload_file(
                  path_or_fileobj=path,
                  path_in_repo=path,
                  repo_id=repo_id,
                  repo_type="dataset",
                  token=token,
              )
          EOF

