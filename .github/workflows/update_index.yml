name: Weekly TMDB Auto-Updater

on:
  schedule:
    # Run at midnight (UTC) every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  update-index:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true # We need LFS for the FAISS index
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run TMDB Fetcher
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python smart_tmdb_fetcher.py
        
      - name: Update FAISS Index
        run: python update_index.py
        
      - name: Commit and push changes back to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add healed_tmdb_dataset.csv index_data.pkl faiss.index
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: Auto-updated TMDB dataset and FAISS index"
          git push
          
      - name: Push updated code to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add huggingface https://uditkumar:$HF_TOKEN@huggingface.co/spaces/uditkumar/MoviesIndex
          git push huggingface main --force
